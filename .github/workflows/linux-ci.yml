name: Linux CI Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-gnu
  ARTIFACT_NAME: whispercrabs-linux-x86_64

jobs:
  linux-build:
    name: Build Linux release
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local cargo overrides
        run: rm -f .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}-linux-ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libgraphene-1.0-dev libvulkan-dev \
            libasound2-dev cmake libclang-dev

      - name: Build release executable
        run: cargo build --release --target ${{ env.TARGET }}

      - name: Package Linux tarball
        run: |
          staging="whispercrabs-linux"
          mkdir -p "$staging"
          cp "target/${TARGET}/release/whispercrabs" "$staging/"
          if [ ! -f "$staging/whispercrabs" ]; then
            echo "Packaged executable missing"
            exit 1
          fi
          chmod +x "$staging/whispercrabs"
          tar -czf "${ARTIFACT_NAME}.tar.gz" -C "$staging" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error

      - name: Attach Linux tarball to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ARTIFACT_NAME }}.tar.gz
